name: keepalive

# GitHub disables scheduled workflows after 60 days without repository
# activity. A monthly heartbeat commit resets that timer for every cron
# in this repo, so the collector keeps running unattended.
on:
  schedule:
    - cron: "23 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/heartbeat
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/heartbeat
          git commit -m "chore: heartbeat (keep scheduled workflows alive)"
          git push
