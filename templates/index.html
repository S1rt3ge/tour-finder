<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tour-finder — горящие туры из Риги</title>
<style>
  :root { --accent: #e35d2b; --bg: #faf8f5; --card: #fff; --text: #2b2926; --muted: #8a857d; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--text); }
  header { padding: 24px 32px 8px; }
  header h1 { margin: 0; font-size: 22px; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 14px; }
  form { display: flex; flex-wrap: wrap; gap: 12px; padding: 16px 32px; align-items: end; }
  label { display: flex; flex-direction: column; font-size: 12px; color: var(--muted); gap: 4px; }
  input, select { padding: 8px 10px; border: 1px solid #ddd6cc; border-radius: 8px;
                  font-size: 14px; background: var(--card); min-width: 110px; }
  select[multiple] { min-height: 70px; }
  button { padding: 10px 22px; border: 0; border-radius: 8px; background: var(--accent);
           color: #fff; font-size: 15px; cursor: pointer; }
  button:hover { filter: brightness(1.08); }
  .hotcheck { flex-direction: row; align-items: center; font-size: 14px; color: var(--text); }
  #status { padding: 0 32px 8px; color: var(--muted); font-size: 14px; }
  #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
             gap: 16px; padding: 8px 32px 40px; }
  .card { background: var(--card); border-radius: 12px; overflow: hidden;
          box-shadow: 0 1px 4px rgba(0,0,0,.07); display: flex; flex-direction: column; }
  .card img { width: 100%; height: 170px; object-fit: cover; background: #eee; }
  .card .body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .card h3 { margin: 0; font-size: 16px; }
  .meta { color: var(--muted); font-size: 13px; }
  .price-row { display: flex; align-items: baseline; gap: 8px; margin-top: auto; }
  .price { font-size: 20px; font-weight: 700; }
  .badge-hot { background: #ffe6d9; color: #c2410c; font-size: 12px; padding: 2px 8px;
               border-radius: 999px; font-weight: 600; }
  .badge-overavg { background: #fef3c7; color: #92400e; font-size: 12px; padding: 2px 8px;
                   border-radius: 999px; }
  .rating-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .rating { font-weight: 600; }
  .badge-overrated { background: #fee2e2; color: #b91c1c; font-size: 12px; padding: 2px 8px;
                     border-radius: 999px; }
  .badge-underrated { background: #dcfce7; color: #15803d; font-size: 12px; padding: 2px 8px;
                      border-radius: 999px; }
  .range { font-size: 12px; color: var(--muted); }
  button.history-toggle { background: none; border: 0; padding: 0; text-align: left;
                          cursor: pointer; font-size: 12px; color: var(--muted); }
  button.history-toggle:hover { color: var(--accent); filter: none; }
  .history:not(:empty) { padding: 4px 0; }
  a.book { text-decoration: none; color: var(--accent); font-size: 14px; font-weight: 600; }
  button.ghost { background: none; color: var(--accent); border: 1px solid var(--accent); }
  button.ghost:hover { background: #fff2ec; filter: none; }
  #subs-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
              padding: 0 32px 8px; }
  #subs { padding: 0 32px 8px; }
  .sub { display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
         background: var(--card); border-radius: 8px; padding: 8px 12px;
         box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 6px; font-size: 14px; }
  .sub .sub-name { font-weight: 600; }
  .sub .sub-desc { color: var(--muted); font-size: 12px; }
  .sub.off { opacity: .5; }
  .sub-badge { background: var(--accent); color: #fff; border-radius: 999px;
               font-size: 12px; padding: 1px 8px; }
  .sub button { padding: 4px 10px; font-size: 13px; }
  #alerts { position: fixed; right: 16px; bottom: 16px; width: min(360px, 90vw);
            display: flex; flex-direction: column; gap: 8px; z-index: 50; }
  .toast { background: var(--card); border-left: 4px solid var(--accent);
           border-radius: 8px; padding: 10px 12px; box-shadow: 0 4px 16px rgba(0,0,0,.18);
           font-size: 13px; }
  .toast b { display: block; margin-bottom: 2px; }
  .toast a { color: var(--accent); font-weight: 600; text-decoration: none; }
  .drop { color: #16a34a; font-weight: 600; }
</style>
</head>
<body>
<header>
  <h1>tour-finder</h1>
  <p>Туры из Риги в последнюю минуту. Направление не обязательно — сортируем по цене.</p>
</header>

<form id="f">
  <label>Вылет с <input type="date" name="date_from" required></label>
  <label>Вылет по <input type="date" name="date_till" required></label>
  <label>Взрослых <input type="number" name="adults" value="2" min="1" max="6"></label>
  <label>Ночей от <input type="number" name="nights_min" value="1" min="1" max="30"></label>
  <label>Ночей до <input type="number" name="nights_max" value="14" min="1" max="30"></label>
  <label>Бюджет до, € <input type="number" name="budget_max" placeholder="без лимита" min="0" step="50"></label>
  <label>Питание
    <select name="boards" multiple>
      {% for b in boards %}<option value="{{ b.board_code }}">{{ b.board_name or b.board_code }}</option>{% endfor %}
    </select>
  </label>
  <label>Страна (не обязательно)
    <select name="countries" multiple>
      {% for c in countries %}<option value="{{ c.country_id }}">{{ c.country_name }}</option>{% endfor %}
    </select>
  </label>
  <label class="hotcheck"><input type="checkbox" name="only_hot"> только горящие</label>
  <button type="submit">Искать</button>
  <button type="button" id="save-sub" class="ghost">Сохранить как подписку</button>
</form>

<div id="subs-bar">
  <button type="button" id="sound-toggle" class="ghost">🔔 включить звук</button>
  <span class="meta" id="poll-status"></span>
</div>
<div id="subs"></div>

<div id="status">База пуста? Сначала запусти сбор: <code>python -m tourfinder.cli fetch</code></div>
<div id="results"></div>
<div id="alerts"></div>

<script>
const f = document.getElementById('f');
const results = document.getElementById('results');
const status = document.getElementById('status');

const today = new Date(), plus3w = new Date(Date.now() + 21 * 864e5);
f.date_from.value = today.toISOString().slice(0, 10);
f.date_till.value = plus3w.toISOString().slice(0, 10);

const euro = c => (c / 100).toLocaleString('ru-RU', { maximumFractionDigits: 0 }) + ' €';
const multi = sel => [...sel.selectedOptions].map(o => o.value).join(',');

// One place that reads the form into a filter object — shared by search and
// by "save as subscription", so a saved search matches what you just ran.
function currentFilters() {
  const flt = {
    date_from: f.date_from.value, date_till: f.date_till.value,
    adults: +f.adults.value, nights_min: +f.nights_min.value,
    nights_max: +f.nights_max.value,
  };
  if (f.budget_max.value) flt.budget_max = +f.budget_max.value;
  const b = multi(f.boards); if (b) flt.boards = b;
  const c = multi(f.countries); if (c) flt.countries = c;
  if (f.only_hot.checked) flt.only_hot = true;
  return flt;
}

f.addEventListener('submit', async e => {
  e.preventDefault();
  const flt = currentFilters();
  const p = new URLSearchParams();
  for (const [k, v] of Object.entries(flt)) p.set(k, v);

  status.textContent = 'Ищем…';
  results.innerHTML = '';
  const r = await fetch('/api/search?' + p);
  const data = await r.json();
  status.textContent = data.count
    ? `Найдено: ${data.count}`
    : 'Ничего не найдено. Проверь фильтры или запусти сбор данных.';

  for (const t of data.results) {
    // "hot but pricier than its own average": our observed average when we
    // have enough history, otherwise the operator's own average if present
    const ourAvgReady = t.snapshots_count >= 3 && t.avg_seen_cents;
    const overAvg = t.is_hot && (
      (ourAvgReady && t.price_cents > t.avg_seen_cents * 1.02) ||
      (!ourAvgReady && t.operator_avg_price_cents && t.price_cents > t.operator_avg_price_cents));
    const stars = t.category ? '★'.repeat(parseInt(t.category)) : '';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      ${t.photo_url ? `<img src="${t.photo_url}" loading="lazy" alt="">` : '<img alt="">'}
      <div class="body">
        <h3>${t.hotel_name} <span class="meta">${stars}</span></h3>
        <div class="meta">${t.country_name || ''}${t.city_name ? ', ' + t.city_name : ''}</div>
        ${ratingRow(t)}
        <div class="meta">${t.date_start} → ${t.date_end || ''} · ${t.nights} н. · ${t.board_name || t.board_code}${t.room_name ? ' · ' + t.room_name : ''}</div>
        <div class="price-row">
          <span class="price">${euro(t.price_cents)}</span>
          ${t.is_hot ? '<span class="badge-hot">горящий</span>' : ''}
          ${overAvg ? '<span class="badge-overavg">дороже среднего</span>' : ''}
          ${t.availability ? `<span class="meta">мест: ${t.availability}</span>` : ''}
        </div>
        <button type="button" class="range history-toggle">${t.snapshots_count > 1
          ? `история цены: ${t.snapshots_count} наблюдений, ${euro(t.min_seen_cents)}–${euro(t.max_seen_cents)} ▾`
          : 'первое наблюдение'}</button>
        <div class="history"></div>
        <a class="book" href="${t.link}" target="_blank" rel="noopener">Открыть у оператора →</a>
      </div>`;
    card.querySelector('.history-toggle')
        .addEventListener('click', () => toggleHistory(card, t.offer_id));
    results.appendChild(card);
  }
});

// Guest rating + the gap vs official stars. star_gap < 0 → guests rate below
// the star class (overrated); > 0 → underrated. Small gaps are noise.
function ratingRow(t) {
  if (t.review_rating == null) return '';
  const scale = t.review_scale || 5;
  const cnt = t.review_count ? ` · ${t.review_count.toLocaleString('ru-RU')} отзывов` : '';
  const src = t.review_platform === 'google' ? 'Google' : t.review_platform;
  let badge = '';
  if (t.star_gap != null && t.star_gap <= -0.75)
    badge = '<span class="badge-overrated">хуже звёзд</span>';
  else if (t.star_gap != null && t.star_gap >= 0.75)
    badge = '<span class="badge-underrated">лучше звёзд</span>';
  const rating = `${(+t.review_rating).toFixed(1)}${scale != 5 ? '/' + scale : ''}`;
  const inner = `<span class="rating">★ ${rating}</span><span class="meta">${src}${cnt}</span>${badge}`;
  return t.review_url
    ? `<div class="rating-row"><a href="${t.review_url}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit">${inner}</a></div>`
    : `<div class="rating-row">${inner}</div>`;
}

async function toggleHistory(card, offerId) {
  const panel = card.querySelector('.history');
  if (panel.innerHTML) { panel.innerHTML = ''; return; }
  panel.innerHTML = '<span class="meta">грузим…</span>';
  const r = await fetch(`/api/offers/${offerId}/history`);
  const { history } = await r.json();
  panel.innerHTML = history.length < 2
    ? '<span class="meta">Пока одно наблюдение — график появится после следующих сборов.</span>'
    : priceChart(history);
}

function priceChart(hist) {
  const w = 300, h = 70, pad = 6;
  const ts = hist.map(p => new Date(p.fetched_at).getTime());
  const ps = hist.map(p => p.price_cents);
  const tmin = Math.min(...ts), tmax = Math.max(...ts);
  const pmin = Math.min(...ps), pmax = Math.max(...ps);
  const x = t => tmax === tmin ? w / 2 : pad + (t - tmin) / (tmax - tmin) * (w - 2 * pad);
  const y = p => pmax === pmin ? h / 2 : h - pad - (p - pmin) / (pmax - pmin) * (h - 2 * pad);
  const pts = hist.map((p, i) => `${x(ts[i]).toFixed(1)},${y(ps[i]).toFixed(1)}`).join(' ');
  const dots = hist.map((p, i) =>
    `<circle cx="${x(ts[i]).toFixed(1)}" cy="${y(ps[i]).toFixed(1)}" r="2.5"
             fill="${p.is_hot ? '#c2410c' : 'var(--accent)'}"/>`).join('');
  const d0 = new Date(tmin).toLocaleDateString('ru-RU'), d1 = new Date(tmax).toLocaleDateString('ru-RU');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
      <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2"/>${dots}
    </svg>
    <div class="meta">${d0} — ${d1} · ${euro(pmin)}–${euro(pmax)} · точка красная = был горящим</div>`;
}

// --- subscriptions --------------------------------------------------------

const subsBox = document.getElementById('subs');

function filtersDesc(flt) {
  const parts = [`${flt.date_from}…${flt.date_till}`, `${flt.adults} взр.`,
                 `${flt.nights_min}–${flt.nights_max} н.`];
  if (flt.budget_max) parts.push(`до ${flt.budget_max} €`);
  if (flt.only_hot) parts.push('горящие');
  if (flt.countries) parts.push(`страны: ${flt.countries}`);
  return parts.join(' · ');
}

async function loadSubs() {
  const { subscriptions } = await (await fetch('/api/subscriptions')).json();
  subsBox.innerHTML = '';
  for (const s of subscriptions) {
    const el = document.createElement('div');
    el.className = 'sub' + (s.enabled ? '' : ' off');
    el.innerHTML = `
      <span class="sub-name">${s.name}</span>
      ${s.unseen ? `<span class="sub-badge">${s.unseen} новых</span>` : ''}
      <span class="sub-desc">${filtersDesc(s.filters)}</span>
      <button type="button" class="ghost" data-act="toggle">${s.enabled ? 'выкл' : 'вкл'}</button>
      <button type="button" class="ghost" data-act="del">удалить</button>`;
    el.querySelector('[data-act=toggle]').onclick = async () => {
      await fetch(`/api/subscriptions/${s.id}`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled: !s.enabled }) });
      loadSubs();
    };
    el.querySelector('[data-act=del]').onclick = async () => {
      if (!confirm(`Удалить подписку «${s.name}»?`)) return;
      await fetch(`/api/subscriptions/${s.id}`, { method: 'DELETE' });
      loadSubs();
    };
    subsBox.appendChild(el);
  }
}

document.getElementById('save-sub').onclick = async () => {
  const flt = currentFilters();
  if (!flt.date_from || !flt.date_till) { alert('Задай даты вылета'); return; }
  const name = prompt('Название подписки:', `Туры ${flt.date_from}`);
  if (name === null) return;
  const r = await fetch('/api/subscriptions', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, filters: flt }) });
  if (!r.ok) { alert('Не вышло сохранить: нужны даты вылета'); return; }
  await loadSubs();
  ensurePolling();
};

// --- alerts: poll + sound -------------------------------------------------

const pollStatus = document.getElementById('poll-status');
const alertsBox = document.getElementById('alerts');
let audioCtx = null, soundOn = false, pollTimer = null;
const seenAlertIds = new Set();

document.getElementById('sound-toggle').onclick = function () {
  soundOn = !soundOn;
  this.textContent = soundOn ? '🔔 звук включён' : '🔔 включить звук';
  if (soundOn) {
    // AudioContext must be created/resumed from a user gesture
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
    beep();
    ensurePolling();
  }
};

function beep() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.value = 880;
  g.gain.setValueAtTime(0.001, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.25, audioCtx.currentTime + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.5);
}

function ensurePolling() {
  if (pollTimer) return;
  poll();
  pollTimer = setInterval(poll, 60000);
}

async function poll() {
  let data;
  try {
    data = await (await fetch('/api/poll', { method: 'POST' })).json();
  } catch { pollStatus.textContent = 'опрос: ошибка сети'; return; }

  const fresh = data.alerts.filter(a => !seenAlertIds.has(a.id));
  for (const a of data.alerts) seenAlertIds.add(a.id);

  pollStatus.textContent = `следим · непрочитанных совпадений: ${data.unseen} · ${new Date().toLocaleTimeString('ru-RU')}`;
  loadSubs();

  if (fresh.length) {
    if (soundOn) beep();
    for (const a of fresh.slice(0, 5)) showToast(a);
  }
}

function showToast(a) {
  const drop = a.reason === 'price_drop';
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `
    <b>${drop ? '<span class="drop">Цена упала</span>' : 'Новое совпадение'} · ${a.sub_name}</b>
    ${a.hotel_name} — ${a.country_name || ''}${a.city_name ? ', ' + a.city_name : ''}<br>
    ${a.date_start} · ${a.nights} н. · ${a.board_code} · <b>${euro(a.price_cents)}</b>
    <br><a href="${a.link}" target="_blank" rel="noopener">Открыть →</a>
    · <a href="#" data-dismiss>скрыть</a>`;
  el.querySelector('[data-dismiss]').onclick = async (e) => {
    e.preventDefault();
    await fetch('/api/alerts/seen', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids: [a.id] }) });
    el.remove(); loadSubs();
  };
  alertsBox.appendChild(el);
}

// start: show existing subscriptions; poll if any exist
loadSubs().then(() => fetch('/api/subscriptions').then(r => r.json()).then(d => {
  if (d.subscriptions.length) ensurePolling();
}));
</script>
</body>
</html>
